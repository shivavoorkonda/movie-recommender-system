services:
  - type: web
    name: movie-recommender-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --timeout 120 --bind 0.0.0.0:$PORT web.app:app
    envVars:
      - key: PYTHONIOENCODING
        value: utf-8
      - key: PYTHONUTF8
        value: "1"
